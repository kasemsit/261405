name: Deploy slides to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Permissions needed to deploy to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Render the deck
        # Diagrams/charts are committed as SVGs, so no mermaid-cli or
        # matplotlib is needed here — just render the Quarto document.
        run: quarto render slides/ml-intro.qmd --to revealjs

      - name: Assemble the site (deck becomes the home page)
        run: |
          mkdir -p _site
          cp slides/ml-intro.html      _site/index.html
          cp -r slides/ml-intro_files  _site/ml-intro_files
          cp -r slides/images          _site/images

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
