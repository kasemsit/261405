<svg viewBox="0 0 460 196" xmlns="http://www.w3.org/2000/svg"
     font-family="Inter, 'Segoe UI', 'Noto Sans Thai', system-ui, sans-serif">
  <defs>
    <marker id="fl-arr" markerWidth="9" markerHeight="7" refX="7" refY="3.5" orient="auto">
      <polygon points="0 0, 9 3.5, 0 7" fill="#555"/>
    </marker>
    <marker id="fl-arr-r" markerWidth="10" markerHeight="8" refX="8" refY="4" orient="auto">
      <polygon points="0 0, 10 4, 0 8" fill="#b8232f"/>
    </marker>
  </defs>

  <!-- box 1: data -->
  <rect x="14" y="22" width="132" height="56" rx="8" fill="#fbeeef" stroke="#b8232f" stroke-width="2"/>
  <text x="80" y="46" text-anchor="middle" font-size="12.5" font-weight="700" fill="#b8232f">Skewed / historical</text>
  <text x="80" y="63" text-anchor="middle" font-size="12.5" font-weight="700" fill="#b8232f">data</text>

  <line x1="146" y1="50" x2="172" y2="50" stroke="#555" stroke-width="2" marker-end="url(#fl-arr)"/>

  <!-- box 2: model -->
  <rect x="176" y="22" width="104" height="56" rx="8" fill="#1d4ed8"/>
  <text x="228" y="46" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">Model</text>
  <text x="228" y="63" text-anchor="middle" font-size="10.5" fill="#cdd9fb">learns the bias</text>

  <line x1="280" y1="50" x2="308" y2="50" stroke="#555" stroke-width="2" marker-end="url(#fl-arr)"/>

  <!-- box 3: outcomes -->
  <rect x="312" y="22" width="134" height="56" rx="8" fill="#b8232f"/>
  <text x="379" y="46" text-anchor="middle" font-size="12.5" font-weight="700" fill="#fff">Unequal</text>
  <text x="379" y="63" text-anchor="middle" font-size="12.5" font-weight="700" fill="#fff">outcomes</text>

  <!-- feedback loop -->
  <path d="M 379 82 L 379 150 L 80 150 L 80 82" fill="none" stroke="#b8232f" stroke-width="2.5"
        stroke-dasharray="6,4" marker-end="url(#fl-arr-r)"/>
  <text x="230" y="170" text-anchor="middle" font-size="12" font-style="italic" fill="#b8232f">Outcomes become tomorrow&#8217;s data &#8212; bias compounds</text>
</svg>
