<svg viewBox="0 0 346.17 296.1" xmlns="http://www.w3.org/2000/svg"
     font-family="Inter, 'Segoe UI', system-ui, sans-serif">

  <!-- Title -->
  <text x="180.16" y="19.05" text-anchor="middle" font-size="15.6" font-weight="700" fill="#7a1f2b">Confusion matrix</text>

  <!-- X-axis labels -->
  <text x="102.31" y="286.61" text-anchor="middle" font-size="11" fill="#1f2933">predicted +</text>
  <text x="258.00" y="286.61" text-anchor="middle" font-size="11" fill="#1f2933">predicted −</text>

  <!-- Y-axis labels (rotated) -->
  <text transform="translate(15.56 111.99) rotate(-90)" text-anchor="middle" font-size="11" fill="#1f2933">actual +</text>
  <text transform="translate(15.56 234.40) rotate(-90)" text-anchor="middle" font-size="11" fill="#1f2933">actual −</text>

  <!-- TP: top-left, green -->
  <rect x="26.46" y="29.50" width="151.70" height="118.40" rx="8" fill="#e6f4ea" stroke="#cdd4dc" stroke-width="1.2"/>
  <text x="102.31" y="78.71" text-anchor="middle" font-size="17" font-weight="700" fill="#1f2933">TP</text>
  <text x="102.31" y="113.08" text-anchor="middle" font-size="9" fill="#7b8794">caught it</text>
  <text x="102.31" y="123.15" text-anchor="middle" font-size="9" fill="#7b8794">(correct)</text>

  <!-- FN: top-right, amber -->
  <rect x="182.16" y="29.50" width="151.70" height="118.40" rx="8" fill="#fff3e0" stroke="#cdd4dc" stroke-width="1.2"/>
  <text x="258.00" y="78.71" text-anchor="middle" font-size="17" font-weight="700" fill="#1f2933">FN</text>
  <text x="258.00" y="113.08" text-anchor="middle" font-size="9" fill="#7b8794">missed it</text>
  <text x="258.00" y="123.15" text-anchor="middle" font-size="9" fill="#7b8794">(false neg)</text>

  <!-- FP: bottom-left, amber -->
  <rect x="26.46" y="151.90" width="151.70" height="118.40" rx="8" fill="#fff3e0" stroke="#cdd4dc" stroke-width="1.2"/>
  <text x="102.31" y="201.11" text-anchor="middle" font-size="17" font-weight="700" fill="#1f2933">FP</text>
  <text x="102.31" y="235.48" text-anchor="middle" font-size="9" fill="#7b8794">false alarm</text>
  <text x="102.31" y="245.56" text-anchor="middle" font-size="9" fill="#7b8794">(false pos)</text>

  <!-- TN: bottom-right, green -->
  <rect x="182.16" y="151.90" width="151.70" height="118.40" rx="8" fill="#e6f4ea" stroke="#cdd4dc" stroke-width="1.2"/>
  <text x="258.00" y="201.11" text-anchor="middle" font-size="17" font-weight="700" fill="#1f2933">TN</text>
  <text x="258.00" y="235.48" text-anchor="middle" font-size="9" fill="#7b8794">correct</text>
  <text x="258.00" y="245.56" text-anchor="middle" font-size="9" fill="#7b8794">rejection</text>
</svg>
