<svg viewBox="0 0 904 234" xmlns="http://www.w3.org/2000/svg"
     font-family="Inter, 'Segoe UI', 'Noto Sans Thai', system-ui, sans-serif">
  <defs>
    <marker id="dp-arr" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <polygon points="0 0, 9 3.5, 0 7" fill="#555"/>
    </marker>
  </defs>

  <!-- ===== 1 · Collect & label (blue) ===== -->
  <rect x="12" y="16" width="196" height="96" rx="10" fill="#e8f0fe" stroke="#1d4ed8" stroke-width="2.5"/>
  <text x="110" y="46" text-anchor="middle" font-size="14.5" font-weight="700" fill="#10406b">&#9312;  Collect &amp; label</text>
  <text x="110" y="72" text-anchor="middle" font-size="12" fill="#444">Where do examples</text>
  <text x="110" y="90" text-anchor="middle" font-size="12" fill="#444">come from? Who labels?</text>

  <line x1="208" y1="64" x2="238" y2="64" stroke="#555" stroke-width="2.2" marker-end="url(#dp-arr)"/>

  <!-- ===== 2 · Pipeline (purple) ===== -->
  <rect x="240" y="16" width="196" height="96" rx="10" fill="#f3e8fd" stroke="#8430ce" stroke-width="2.5"/>
  <text x="338" y="46" text-anchor="middle" font-size="14.5" font-weight="700" fill="#4a1d75">&#9313;  Pipeline · ETL/ELT</text>
  <text x="338" y="72" text-anchor="middle" font-size="12" fill="#444">Move &amp; clean data:</text>
  <text x="338" y="90" text-anchor="middle" font-size="12" fill="#444">raw &#8594; tidy &amp; consistent</text>

  <line x1="436" y1="64" x2="466" y2="64" stroke="#555" stroke-width="2.2" marker-end="url(#dp-arr)"/>

  <!-- ===== 3 · Store (grey panel) ===== -->
  <rect x="468" y="10" width="424" height="108" rx="10" fill="#eceff1" stroke="#5f7d8c" stroke-width="2.5"/>
  <text x="482" y="29" font-size="13.5" font-weight="700" fill="#324a54">&#9314;  Store</text>

  <rect x="482" y="38" width="396" height="34" rx="7" fill="#fafbfc" stroke="#5f7d8c"/>
  <text x="494" y="59" font-size="12" fill="#324a54"><tspan font-weight="700">&#128230; Object storage</tspan> = cloud folder for <tspan font-weight="700">raw files</tspan> (e.g. S3)</text>

  <rect x="482" y="78" width="396" height="34" rx="7" fill="#fafbfc" stroke="#5f7d8c"/>
  <text x="494" y="99" font-size="12" fill="#324a54"><tspan font-weight="700">&#128452;&#65039; Feature store</tspan> = DB of <tspan font-weight="700">model-ready inputs</tspan> (features)</text>

  <!-- ===== 4 · Version & protect (amber band, spans all) ===== -->
  <rect x="12" y="140" width="880" height="82" rx="10" fill="#fff3e0" stroke="#d97706" stroke-width="2.5"/>
  <text x="32" y="170" font-size="14.5" font-weight="700" fill="#8a5200">&#128274;  &#9315;  Version &amp; protect &#8212; across every stage</text>
  <text x="32" y="196" font-size="12.5" fill="#6b4a12">Track each change to the data (so results stay reproducible), and guard <tspan font-weight="700">PII</tspan>.</text>
  <text x="32" y="214" font-size="12.5" fill="#6b4a12"><tspan font-weight="700">PII</tspan> = personally identifiable info &#8212; name, citizen ID, face &#8212; <tspan font-weight="700">privacy law (PDPA) applies</tspan>.</text>
</svg>
