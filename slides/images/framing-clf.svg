<svg viewBox="0 0 700 205" xmlns="http://www.w3.org/2000/svg"
     font-family="Inter, 'Segoe UI', 'Noto Sans Thai', system-ui, sans-serif">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#555"/>
    </marker>
    <marker id="arr-r" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#b8232f"/>
    </marker>
  </defs>

  <!-- Panel -->
  <rect x="2" y="2" width="696" height="201" rx="10" fill="#fff5f5" stroke="#b8232f" stroke-width="2.5"/>
  <text x="348" y="26" text-anchor="middle" font-size="15" font-weight="700" fill="#b8232f">&#10060;  Classification</text>

  <!-- Input box (model centre at y=87) -->
  <rect x="14" y="73" width="112" height="28" rx="5" fill="#f7f8fa" stroke="#aaa"/>
  <text x="70" y="91" text-anchor="middle" font-size="12">user + context</text>

  <!-- Arrow: input → model -->
  <line x1="126" y1="87" x2="154" y2="87" stroke="#555" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Model box -->
  <rect x="154" y="73" width="64" height="28" rx="5" fill="#7a1f2b"/>
  <text x="186" y="92" text-anchor="middle" fill="white" font-size="13" font-weight="700">Model</text>

  <!-- Fan-out arrows from (218, 87) → output box centres -->
  <line x1="218" y1="87" x2="244" y2="49"  stroke="#b8232f" stroke-width="1.5" marker-end="url(#arr-r)"/>
  <line x1="218" y1="87" x2="244" y2="71"  stroke="#b8232f" stroke-width="1.5" marker-end="url(#arr-r)"/>
  <line x1="218" y1="87" x2="244" y2="97"  stroke="#b8232f" stroke-width="1.5" marker-end="url(#arr-r)"/>
  <line x1="218" y1="87" x2="244" y2="137" stroke="#b8232f" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arr-r)"/>

  <!-- Output boxes (x=244, w=108) -->
  <rect x="244" y="38"  width="108" height="22" rx="4" fill="#fdeec0" stroke="#e8a800"/>
  <text x="298" y="53"  text-anchor="middle" font-size="11.5">P(Instagram)</text>

  <rect x="244" y="60"  width="108" height="22" rx="4" fill="#fdeec0" stroke="#e8a800"/>
  <text x="298" y="75"  text-anchor="middle" font-size="11.5">P(YouTube)</text>

  <rect x="244" y="86"  width="108" height="22" rx="4" fill="#fdeec0" stroke="#e8a800"/>
  <text x="298" y="101" text-anchor="middle" font-size="11.5">P(TikTok)</text>

  <text x="298" y="118" text-anchor="middle" font-size="13" fill="#999">&#8942;</text>

  <rect x="244" y="126" width="108" height="22" rx="4" fill="#f8f0f0" stroke="#b8232f" stroke-dasharray="5,3"/>
  <text x="298" y="141" text-anchor="middle" font-size="11.5" fill="#b8232f">P(NewApp) ???</text>

  <!-- Brace: vertical bar + ticks spanning output boxes (y=38..148) -->
  <line x1="360" y1="38"  x2="360" y2="148" stroke="#b8232f" stroke-width="1.5"/>
  <line x1="354" y1="38"  x2="360" y2="38"  stroke="#b8232f" stroke-width="1.5"/>
  <line x1="354" y1="148" x2="360" y2="148" stroke="#b8232f" stroke-width="1.5"/>
  <!-- Arrow pointing right at midpoint -->
  <line x1="360" y1="93"  x2="376" y2="93"  stroke="#b8232f" stroke-width="1.5" marker-end="url(#arr-r)"/>

  <!-- Right annotation -->
  <text x="382" y="83"  font-size="13.5" font-weight="700" fill="#b8232f">N outputs</text>
  <text x="382" y="101" font-size="12"   fill="#555">one output per app (fixed!)</text>
  <text x="382" y="119" font-size="12"   fill="#555">Output size tied to the catalogue</text>

  <!-- Problem callout boxes -->
  <rect x="362" y="130" width="324" height="28" rx="5" fill="#f8f0f0" stroke="#b8232f" stroke-width="1.5"/>
  <text x="524" y="148" text-anchor="middle" font-size="12" fill="#b8232f">Add a new app &#8594; output layer must grow</text>

  <rect x="362" y="164" width="324" height="32" rx="5" fill="#7a1f2b"/>
  <text x="524" y="185" text-anchor="middle" font-size="14" font-weight="700" fill="white">&#8594; Must retrain from scratch &#128543;</text>
</svg>
