<svg viewBox="0 0 620 300" xmlns="http://www.w3.org/2000/svg"
     font-family="Inter, 'Segoe UI', 'Noto Sans Thai', system-ui, sans-serif">
  <defs>
    <marker id="hn-arr" markerWidth="9" markerHeight="7" refX="7" refY="3.5" orient="auto">
      <polygon points="0 0, 9 3.5, 0 7" fill="#555"/>
    </marker>
    <marker id="hn-arr-g" markerWidth="9" markerHeight="7" refX="7" refY="3.5" orient="auto">
      <polygon points="0 0, 9 3.5, 0 7" fill="#137333"/>
    </marker>
    <marker id="hn-arr-b" markerWidth="9" markerHeight="7" refX="7" refY="3.5" orient="auto">
      <polygon points="0 0, 9 3.5, 0 7" fill="#1d4ed8"/>
    </marker>
  </defs>

  <!-- HARNESS wrapper -->
  <rect x="92" y="56" width="440" height="212" rx="12" fill="#f5f7ff" stroke="#1d4ed8" stroke-width="2.5"/>
  <text x="104" y="78" font-size="13.5" font-weight="800" fill="#1d4ed8">HARNESS &#8212; the runtime that wraps the model</text>

  <!-- 1. Build context -->
  <rect x="118" y="104" width="150" height="56" rx="8" fill="#fff" stroke="#888" stroke-width="1.5"/>
  <text x="193" y="126" text-anchor="middle" font-size="12.5" font-weight="700" fill="#333">1 · Build context</text>
  <text x="193" y="143" text-anchor="middle" font-size="10" fill="#555">prompt · history · memory</text>
  <text x="193" y="155" text-anchor="middle" font-size="10" fill="#555">· tools · retrieved docs</text>

  <!-- 2. LLM -->
  <rect x="356" y="104" width="150" height="56" rx="8" fill="#1d4ed8"/>
  <text x="431" y="128" text-anchor="middle" font-size="14" font-weight="800" fill="#fff">2 · LLM</text>
  <text x="431" y="146" text-anchor="middle" font-size="10" fill="#cdd9fb">predicts: reply or &#8220;call tool&#8221;</text>

  <!-- 3. Run tool -->
  <rect x="356" y="196" width="150" height="56" rx="8" fill="#fff" stroke="#137333" stroke-width="1.8"/>
  <text x="431" y="218" text-anchor="middle" font-size="12.5" font-weight="700" fill="#137333">3 · Run tool &#128274;</text>
  <text x="431" y="235" text-anchor="middle" font-size="10" fill="#555">execute: code · API · search</text>

  <!-- 4. Observe -->
  <rect x="118" y="196" width="150" height="56" rx="8" fill="#fff" stroke="#d97706" stroke-width="1.8"/>
  <text x="193" y="218" text-anchor="middle" font-size="12.5" font-weight="700" fill="#b45309">4 · Observe result</text>
  <text x="193" y="235" text-anchor="middle" font-size="10" fill="#555">feed the output back in</text>

  <!-- loop arrows (clockwise) -->
  <line x1="268" y1="132" x2="356" y2="132" stroke="#555" stroke-width="2" marker-end="url(#hn-arr)"/>
  <line x1="431" y1="160" x2="431" y2="196" stroke="#137333" stroke-width="2" marker-end="url(#hn-arr-g)"/>
  <text x="441" y="182" font-size="10" font-style="italic" fill="#137333">wants a tool</text>
  <line x1="356" y1="224" x2="268" y2="224" stroke="#555" stroke-width="2" marker-end="url(#hn-arr)"/>
  <line x1="193" y1="196" x2="193" y2="160" stroke="#555" stroke-width="2" marker-end="url(#hn-arr)"/>
  <text x="184" y="182" text-anchor="end" font-size="10" font-style="italic" fill="#555">loop</text>

  <!-- request in -->
  <line x1="36" y1="132" x2="118" y2="132" stroke="#555" stroke-width="2" marker-end="url(#hn-arr)"/>
  <text x="40" y="124" font-size="10.5" fill="#555">user request</text>

  <!-- final answer out -->
  <line x1="506" y1="132" x2="590" y2="132" stroke="#1d4ed8" stroke-width="2" marker-end="url(#hn-arr-b)"/>
  <text x="512" y="148" font-size="10" fill="#1d4ed8">no tool needed</text>
  <text x="512" y="160" font-size="10" fill="#1d4ed8">&#8594; final answer</text>

  <!-- caption -->
  <text x="310" y="290" text-anchor="middle" font-size="12" fill="#444">The LLM only <tspan font-style="italic">says</tspan> what to do; the <tspan font-weight="700" fill="#1d4ed8">harness</tspan> runs the loop, tools, memory &amp; guardrails.</text>
</svg>
