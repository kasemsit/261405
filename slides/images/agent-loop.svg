<svg viewBox="0 0 720 320" xmlns="http://www.w3.org/2000/svg"
     font-family="Inter, 'Segoe UI', 'Noto Sans Thai', system-ui, sans-serif">
  <defs>
    <marker id="ag-arr" markerWidth="9" markerHeight="7" refX="7.5" refY="3.5" orient="auto">
      <polygon points="0 0, 9 3.5, 0 7" fill="#7a1f2b"/>
    </marker>
    <marker id="ag-arr-d" markerWidth="9" markerHeight="7" refX="7.5" refY="3.5" orient="auto">
      <polygon points="0 0, 9 3.5, 0 7" fill="#555"/>
    </marker>
  </defs>

  <!-- Goal in -->
  <rect x="16" y="132" width="104" height="52" rx="8" fill="#f7f8fa" stroke="#aaa"/>
  <text x="68" y="156" text-anchor="middle" font-size="13" font-weight="700">Goal</text>
  <text x="68" y="174" text-anchor="middle" font-size="11.5" fill="#666">from user</text>
  <line x1="120" y1="158" x2="182" y2="158" stroke="#555" stroke-width="2" marker-end="url(#ag-arr-d)"/>

  <!-- THINK -->
  <rect x="182" y="120" width="150" height="76" rx="10" fill="#7a1f2b"/>
  <text x="257" y="150" text-anchor="middle" fill="white" font-size="16" font-weight="700">1 · Think</text>
  <text x="257" y="172" text-anchor="middle" fill="#f4c542" font-size="11.5">reason &amp; plan</text>
  <text x="257" y="186" text-anchor="middle" fill="#f4c542" font-size="11.5">the next step</text>

  <!-- Think -> Act -->
  <line x1="332" y1="158" x2="420" y2="158" stroke="#7a1f2b" stroke-width="2.5" marker-end="url(#ag-arr)"/>

  <!-- ACT -->
  <rect x="420" y="120" width="150" height="76" rx="10" fill="#1d4ed8"/>
  <text x="495" y="150" text-anchor="middle" fill="white" font-size="16" font-weight="700">2 · Act</text>
  <text x="495" y="172" text-anchor="middle" fill="#dbe5ff" font-size="11.5">call a tool:</text>
  <text x="495" y="186" text-anchor="middle" fill="#dbe5ff" font-size="11.5">code, search, API</text>

  <!-- Act -> Observe (down) -->
  <line x1="495" y1="196" x2="495" y2="242" stroke="#137333" stroke-width="2.5" marker-end="url(#ag-arr)"/>

  <!-- OBSERVE -->
  <rect x="360" y="242" width="270" height="58" rx="10" fill="#e6f4ea" stroke="#137333" stroke-width="2"/>
  <text x="495" y="266" text-anchor="middle" fill="#137333" font-size="16" font-weight="700">3 · Observe</text>
  <text x="495" y="286" text-anchor="middle" fill="#137333" font-size="11.5">read the result (test output, page, error)</text>

  <!-- Observe -> Think (loop back) -->
  <line x1="360" y1="271" x2="257" y2="271" stroke="#7a1f2b" stroke-width="2.5"/>
  <line x1="257" y1="271" x2="257" y2="196" stroke="#7a1f2b" stroke-width="2.5" marker-end="url(#ag-arr)"/>
  <text x="270" y="240" font-size="12" font-style="italic" fill="#7a1f2b">loop until done</text>

  <!-- Done out -->
  <rect x="600" y="132" width="104" height="52" rx="8" fill="#fdeec0" stroke="#d97706"/>
  <text x="652" y="156" text-anchor="middle" font-size="13" font-weight="700" fill="#7a4b12">Done</text>
  <text x="652" y="174" text-anchor="middle" font-size="11.5" fill="#7a4b12">goal met</text>
  <line x1="570" y1="150" x2="600" y2="150" stroke="#555" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#ag-arr-d)"/>
  <text x="548" y="128" font-size="11" fill="#888">or stop</text>

  <text x="16" y="40" font-size="15" font-weight="700" fill="#7a1f2b">The agent loop</text>
  <text x="16" y="60" font-size="12.5" fill="#888">reasoning makes each step smarter; tools make each step real</text>
</svg>
