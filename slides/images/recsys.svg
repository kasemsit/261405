<svg viewBox="0 0 480 93" xmlns="http://www.w3.org/2000/svg"
     font-family="Inter, 'Segoe UI', 'Noto Sans Thai', system-ui, sans-serif">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#555"/>
    </marker>
  </defs>

  <!-- ─── Items: stacked rects to suggest large catalogue ─── -->
  <rect x="3"  y="13" width="58" height="54" rx="4" fill="#e0e0e0" stroke="#c0c0c0" stroke-width="1"/>
  <rect x="6"  y="11" width="58" height="54" rx="4" fill="#ebebeb" stroke="#c0c0c0" stroke-width="1"/>
  <rect x="9"  y="8"  width="58" height="58" rx="5" fill="#f7f8fa" stroke="#999"   stroke-width="1.5"/>
  <text x="38" y="33" text-anchor="middle" font-size="16" font-weight="700" fill="#444">M</text>
  <text x="38" y="51" text-anchor="middle" font-size="11"              fill="#666">items</text>

  <!-- Arrow 1 -->
  <line x1="67" y1="37" x2="85" y2="37" stroke="#555" stroke-width="2" marker-end="url(#arr)"/>

  <!-- ─── Retrieve stage ─── -->
  <rect x="87" y="8" width="100" height="58" rx="6" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
  <text x="137" y="32" text-anchor="middle" font-size="13" font-weight="700" fill="#1d4ed8">Retrieve</text>
  <text x="137" y="49" text-anchor="middle" font-size="11"              fill="#1e3a8a">ANN search</text>

  <!-- Arrow 2 -->
  <line x1="187" y1="37" x2="203" y2="37" stroke="#555" stroke-width="2" marker-end="url(#arr)"/>

  <!-- ─── ~100 candidates ─── -->
  <rect x="205" y="8" width="64" height="58" rx="5" fill="#f7f8fa" stroke="#888" stroke-width="1.5"/>
  <text x="237" y="32" text-anchor="middle" font-size="13" font-weight="700" fill="#333">~100</text>
  <text x="237" y="49" text-anchor="middle" font-size="11"              fill="#555">items</text>

  <!-- Arrow 3 -->
  <line x1="269" y1="37" x2="285" y2="37" stroke="#555" stroke-width="2" marker-end="url(#arr)"/>

  <!-- ─── Rank stage ─── -->
  <rect x="287" y="8" width="100" height="58" rx="6" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="337" y="32" text-anchor="middle" font-size="13" font-weight="700" fill="#b45309">Rank</text>
  <text x="337" y="49" text-anchor="middle" font-size="11"              fill="#92400e">two-tower model</text>

  <!-- Arrow 4 -->
  <line x1="387" y1="37" x2="403" y2="37" stroke="#555" stroke-width="2" marker-end="url(#arr)"/>

  <!-- ─── Top-K → User ─── -->
  <rect x="405" y="8" width="70" height="58" rx="6" fill="#d1fae5" stroke="#059669" stroke-width="2"/>
  <text x="440" y="32" text-anchor="middle" font-size="13" font-weight="700" fill="#065f46">Top-K</text>
  <text x="440" y="49" text-anchor="middle" font-size="11"              fill="#065f46">&#8594; User</text>

  <!-- ─── Annotations below ─── -->
  <text x="137" y="80" text-anchor="middle" font-size="10.5" fill="#3b82f6">&#9889; fast (~ms)</text>
  <text x="337" y="80" text-anchor="middle" font-size="10.5" fill="#d97706">&#127919; precise</text>
  <text x="440" y="80" text-anchor="middle" font-size="10.5" fill="#059669">serve to user</text>
</svg>
