<svg viewBox="0 0 720 175" xmlns="http://www.w3.org/2000/svg"
     font-family="Inter, 'Segoe UI', 'Noto Sans Thai', system-ui, sans-serif">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#555"/>
    </marker>
  </defs>

  <!-- ─── pixel grid ──────────────────────────────────────────── -->
  <text x="89" y="14" text-anchor="middle" font-size="11" font-weight="600" fill="#444">Input image</text>

  <!-- outer grid border -->
  <rect x="11" y="20" width="156" height="130" rx="3" fill="#111" stroke="#444" stroke-width="1"/>

  <!-- Row 0: [0, 0, 50, 90, 20, 0] -->
  <rect x="11"  y="20" width="26" height="26" fill="#000" stroke="#333" stroke-width="0.5"/>
  <text x="24"  y="37" text-anchor="middle" font-size="9" fill="#555">0</text>
  <rect x="37"  y="20" width="26" height="26" fill="#000" stroke="#333" stroke-width="0.5"/>
  <text x="50"  y="37" text-anchor="middle" font-size="9" fill="#555">0</text>
  <rect x="63"  y="20" width="26" height="26" fill="#808080" stroke="#999" stroke-width="0.5"/>
  <text x="76"  y="37" text-anchor="middle" font-size="9" fill="#eee">50</text>
  <rect x="89"  y="20" width="26" height="26" fill="#e6e6e6" stroke="#ccc" stroke-width="0.5"/>
  <text x="102" y="37" text-anchor="middle" font-size="9" fill="#444">90</text>
  <rect x="115" y="20" width="26" height="26" fill="#333" stroke="#555" stroke-width="0.5"/>
  <text x="128" y="37" text-anchor="middle" font-size="9" fill="#999">20</text>
  <rect x="141" y="20" width="26" height="26" fill="#000" stroke="#333" stroke-width="0.5"/>
  <text x="154" y="37" text-anchor="middle" font-size="9" fill="#555">0</text>

  <!-- Row 1: [0, 30, 80, 99, 0, 0] -->
  <rect x="11"  y="46" width="26" height="26" fill="#000" stroke="#333" stroke-width="0.5"/>
  <text x="24"  y="63" text-anchor="middle" font-size="9" fill="#555">0</text>
  <rect x="37"  y="46" width="26" height="26" fill="#4d4d4d" stroke="#666" stroke-width="0.5"/>
  <text x="50"  y="63" text-anchor="middle" font-size="9" fill="#bbb">30</text>
  <rect x="63"  y="46" width="26" height="26" fill="#ccc" stroke="#aaa" stroke-width="0.5"/>
  <text x="76"  y="63" text-anchor="middle" font-size="9" fill="#333">80</text>
  <rect x="89"  y="46" width="26" height="26" fill="#fff" stroke="#ccc" stroke-width="0.5"/>
  <text x="102" y="63" text-anchor="middle" font-size="9" fill="#444">99</text>
  <rect x="115" y="46" width="26" height="26" fill="#000" stroke="#333" stroke-width="0.5"/>
  <text x="128" y="63" text-anchor="middle" font-size="9" fill="#555">0</text>
  <rect x="141" y="46" width="26" height="26" fill="#000" stroke="#333" stroke-width="0.5"/>
  <text x="154" y="63" text-anchor="middle" font-size="9" fill="#555">0</text>

  <!-- Row 2: [0, 0, 5, 99, 0, 0] -->
  <rect x="11"  y="72" width="26" height="26" fill="#000" stroke="#333" stroke-width="0.5"/>
  <text x="24"  y="89" text-anchor="middle" font-size="9" fill="#555">0</text>
  <rect x="37"  y="72" width="26" height="26" fill="#000" stroke="#333" stroke-width="0.5"/>
  <text x="50"  y="89" text-anchor="middle" font-size="9" fill="#555">0</text>
  <rect x="63"  y="72" width="26" height="26" fill="#0d0d0d" stroke="#333" stroke-width="0.5"/>
  <text x="76"  y="89" text-anchor="middle" font-size="9" fill="#666">5</text>
  <rect x="89"  y="72" width="26" height="26" fill="#fff" stroke="#ccc" stroke-width="0.5"/>
  <text x="102" y="89" text-anchor="middle" font-size="9" fill="#444">99</text>
  <rect x="115" y="72" width="26" height="26" fill="#000" stroke="#333" stroke-width="0.5"/>
  <text x="128" y="89" text-anchor="middle" font-size="9" fill="#555">0</text>
  <rect x="141" y="72" width="26" height="26" fill="#000" stroke="#333" stroke-width="0.5"/>
  <text x="154" y="89" text-anchor="middle" font-size="9" fill="#555">0</text>

  <!-- Row 3: [0, 0, 0, 99, 0, 0] -->
  <rect x="11"  y="98" width="26" height="26" fill="#000" stroke="#333" stroke-width="0.5"/>
  <text x="24"  y="115" text-anchor="middle" font-size="9" fill="#555">0</text>
  <rect x="37"  y="98" width="26" height="26" fill="#000" stroke="#333" stroke-width="0.5"/>
  <text x="50"  y="115" text-anchor="middle" font-size="9" fill="#555">0</text>
  <rect x="63"  y="98" width="26" height="26" fill="#000" stroke="#333" stroke-width="0.5"/>
  <text x="76"  y="115" text-anchor="middle" font-size="9" fill="#555">0</text>
  <rect x="89"  y="98" width="26" height="26" fill="#fff" stroke="#ccc" stroke-width="0.5"/>
  <text x="102" y="115" text-anchor="middle" font-size="9" fill="#444">99</text>
  <rect x="115" y="98" width="26" height="26" fill="#000" stroke="#333" stroke-width="0.5"/>
  <text x="128" y="115" text-anchor="middle" font-size="9" fill="#555">0</text>
  <rect x="141" y="98" width="26" height="26" fill="#000" stroke="#333" stroke-width="0.5"/>
  <text x="154" y="115" text-anchor="middle" font-size="9" fill="#555">0</text>

  <!-- Row 4: [0, 0, 0, 90, 0, 0] -->
  <rect x="11"  y="124" width="26" height="26" fill="#000" stroke="#333" stroke-width="0.5"/>
  <text x="24"  y="141" text-anchor="middle" font-size="9" fill="#555">0</text>
  <rect x="37"  y="124" width="26" height="26" fill="#000" stroke="#333" stroke-width="0.5"/>
  <text x="50"  y="141" text-anchor="middle" font-size="9" fill="#555">0</text>
  <rect x="63"  y="124" width="26" height="26" fill="#000" stroke="#333" stroke-width="0.5"/>
  <text x="76"  y="141" text-anchor="middle" font-size="9" fill="#555">0</text>
  <rect x="89"  y="124" width="26" height="26" fill="#e6e6e6" stroke="#ccc" stroke-width="0.5"/>
  <text x="102" y="141" text-anchor="middle" font-size="9" fill="#444">90</text>
  <rect x="115" y="124" width="26" height="26" fill="#000" stroke="#333" stroke-width="0.5"/>
  <text x="128" y="141" text-anchor="middle" font-size="9" fill="#555">0</text>
  <rect x="141" y="124" width="26" height="26" fill="#000" stroke="#333" stroke-width="0.5"/>
  <text x="154" y="141" text-anchor="middle" font-size="9" fill="#555">0</text>

  <!-- label below grid -->
  <text x="89" y="165" text-anchor="middle" font-size="10" fill="#777">30 pixel values (features)</text>

  <!-- ─── arrow 1 ──────────────────────────────────────────────── -->
  <line x1="170" y1="85" x2="206" y2="85" stroke="#555" stroke-width="2" marker-end="url(#arr)"/>

  <!-- ─── model box ─────────────────────────────────────────────── -->
  <rect x="206" y="66" width="114" height="38" rx="8" fill="#7a1f2b"/>
  <text x="263" y="86" text-anchor="middle" fill="white" font-size="14" font-weight="700">Model</text>
  <text x="263" y="100" text-anchor="middle" fill="#f4a7a7" font-size="10">(classifier)</text>

  <!-- ─── arrow 2 ──────────────────────────────────────────────── -->
  <line x1="320" y1="85" x2="356" y2="85" stroke="#555" stroke-width="2" marker-end="url(#arr)"/>

  <!-- ─── prediction panel ─────────────────────────────────────── -->
  <rect x="356" y="15" width="355" height="153" rx="10" fill="#f0faf4" stroke="#137333" stroke-width="2"/>
  <text x="533" y="36" text-anchor="middle" font-size="12" font-weight="700" fill="#137333">Prediction</text>

  <!-- digit 0: 3% -->
  <text x="373" y="60" font-size="11" fill="#666">digit 0</text>
  <rect x="432" y="48" width="225" height="13" rx="3" fill="#e0e0e0"/>
  <rect x="432" y="48" width="7"   height="13" rx="3" fill="#999"/>
  <text x="664" y="60" text-anchor="end" font-size="10" fill="#888">3%</text>

  <!-- digit 1: 94% (highlighted) -->
  <text x="373" y="84" font-size="11" font-weight="700" fill="#137333">digit 1  ✓</text>
  <rect x="432" y="72" width="225" height="13" rx="3" fill="#c8e6d4"/>
  <rect x="432" y="72" width="211" height="13" rx="3" fill="#137333"/>
  <text x="664" y="84" text-anchor="end" font-size="10" font-weight="700" fill="#137333">94%</text>

  <!-- digit 2: 2% -->
  <text x="373" y="108" font-size="11" fill="#666">digit 2</text>
  <rect x="432" y="96" width="225" height="13" rx="3" fill="#e0e0e0"/>
  <rect x="432" y="96" width="5"   height="13" rx="3" fill="#999"/>
  <text x="664" y="108" text-anchor="end" font-size="10" fill="#888">2%</text>

  <!-- ellipsis -->
  <text x="533" y="126" text-anchor="middle" font-size="12" fill="#aaa">…</text>

  <!-- result bar -->
  <rect x="371" y="136" width="332" height="25" rx="6" fill="#137333"/>
  <text x="537" y="153" text-anchor="middle" font-size="13" font-weight="700" fill="white">→ Predicted class: "1"</text>
</svg>
