<svg viewBox="0 0 920 314" xmlns="http://www.w3.org/2000/svg"
     font-family="Inter, 'Segoe UI', 'Noto Sans Thai', system-ui, sans-serif">
  <defs>
    <marker id="ml-arr" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <polygon points="0 0, 9 3.5, 0 7" fill="#555"/>
    </marker>
    <marker id="ml-red" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <polygon points="0 0, 9 3.5, 0 7" fill="#b8232f"/>
    </marker>
    <marker id="ml-amber" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <polygon points="0 0, 9 3.5, 0 7" fill="#d97706"/>
    </marker>
    <marker id="ml-blue" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <polygon points="0 0, 9 3.5, 0 7" fill="#1d4ed8"/>
    </marker>
    <marker id="ml-blue-s" markerWidth="9" markerHeight="7" refX="1" refY="3.5" orient="auto">
      <polygon points="9 0, 0 3.5, 9 7" fill="#1d4ed8"/>
    </marker>
  </defs>

  <!-- rollback shortcut (top) -->
  <path d="M278,60 L278,38 L89,38 L89,58" fill="none" stroke="#b8232f" stroke-width="2"
        stroke-dasharray="6,4" marker-end="url(#ml-red)"/>
  <text x="184" y="32" text-anchor="middle" font-size="11.5" font-style="italic" font-weight="700" fill="#b8232f">rollback on regression</text>

  <!-- ===== loop stages ===== -->
  <!-- Deploy -->
  <rect x="14" y="60" width="150" height="66" rx="9" fill="#e6f4ea" stroke="#137333" stroke-width="2.4"/>
  <text x="89" y="89" text-anchor="middle" font-size="14.5" font-weight="700" fill="#0b5e26">Deploy / serve</text>
  <text x="89" y="109" text-anchor="middle" font-size="12" fill="#444">in production</text>

  <line x1="164" y1="93" x2="192" y2="93" stroke="#555" stroke-width="2.4" marker-end="url(#ml-arr)"/>

  <!-- Monitor -->
  <rect x="194" y="60" width="168" height="66" rx="9" fill="#fff3e0" stroke="#d97706" stroke-width="2.4"/>
  <text x="278" y="89" text-anchor="middle" font-size="14.5" font-weight="700" fill="#8a5200">Monitor</text>
  <text x="278" y="109" text-anchor="middle" font-size="12" fill="#6b4a12">accuracy · latency · cost</text>

  <line x1="362" y1="93" x2="390" y2="93" stroke="#555" stroke-width="2.4" marker-end="url(#ml-arr)"/>

  <!-- Detect drift -->
  <rect x="392" y="60" width="168" height="66" rx="9" fill="#fff3e0" stroke="#d97706" stroke-width="2.4"/>
  <text x="476" y="89" text-anchor="middle" font-size="14.5" font-weight="700" fill="#8a5200">Detect drift</text>
  <text x="476" y="109" text-anchor="middle" font-size="12" fill="#6b4a12">data · concept</text>

  <line x1="560" y1="93" x2="588" y2="93" stroke="#555" stroke-width="2.4" marker-end="url(#ml-arr)"/>

  <!-- Retrain -->
  <rect x="590" y="60" width="140" height="66" rx="9" fill="#fde7e9" stroke="#b8232f" stroke-width="2.6"/>
  <text x="660" y="89" text-anchor="middle" font-size="14.5" font-weight="700" fill="#7a1f2b">Retrain</text>
  <text x="660" y="109" text-anchor="middle" font-size="12" fill="#7a1f2b">on fresh data</text>

  <line x1="730" y1="93" x2="758" y2="93" stroke="#555" stroke-width="2.4" marker-end="url(#ml-arr)"/>

  <!-- CI/CD -->
  <rect x="760" y="60" width="150" height="66" rx="9" fill="#f3e8fd" stroke="#8430ce" stroke-width="2.4"/>
  <text x="835" y="89" text-anchor="middle" font-size="14.5" font-weight="700" fill="#4a1d75">CI/CD</text>
  <text x="835" y="109" text-anchor="middle" font-size="12" fill="#4a1d75">test &amp; validate</text>

  <!-- continuous loop (bottom return) -->
  <path d="M835,126 L835,162 L89,162 L89,128" fill="none" stroke="#555" stroke-width="2"
        stroke-dasharray="6,4" marker-end="url(#ml-arr)"/>
  <rect x="372" y="151" width="176" height="22" rx="11" fill="#ffffff" stroke="#aaa" stroke-width="1.5"/>
  <text x="460" y="166" text-anchor="middle" font-size="12" font-weight="700" fill="#555">always-on loop &#8212; never &quot;done&quot;</text>

  <!-- ===== where it runs (hybrid) ===== -->
  <text x="14" y="200" font-size="13.5" font-weight="700" fill="#333">Where it all runs &#8212; the <tspan fill="#1d4ed8">Network team</tspan> links the two (hybrid):</text>

  <rect x="14" y="210" width="378" height="92" rx="10" fill="#e8f0fe" stroke="#1d4ed8" stroke-width="2.4"/>
  <text x="203" y="236" text-anchor="middle" font-size="14" font-weight="700" fill="#10406b">&#9729;&#65039; Public cloud ML</text>
  <text x="203" y="260" text-anchor="middle" font-size="12" fill="#10406b">SageMaker · Vertex AI · Azure ML</text>
  <text x="203" y="280" text-anchor="middle" font-size="12" fill="#444">managed GPU + endpoints</text>

  <!-- hybrid link in the middle -->
  <text x="460" y="244" text-anchor="middle" font-size="11.5" font-weight="700" fill="#1d4ed8">&#128279; Hybrid link</text>
  <text x="460" y="259" text-anchor="middle" font-size="10" fill="#1d4ed8">Direct Connect / VPN</text>
  <text x="460" y="271" text-anchor="middle" font-size="10" fill="#1d4ed8">multi-region</text>
  <line x1="396" y1="288" x2="524" y2="288" stroke="#1d4ed8" stroke-width="2" stroke-dasharray="6,4"
        marker-start="url(#ml-blue-s)" marker-end="url(#ml-blue)"/>

  <rect x="528" y="210" width="378" height="92" rx="10" fill="#eceff1" stroke="#5f7d8c" stroke-width="2.4"/>
  <text x="717" y="236" text-anchor="middle" font-size="14" font-weight="700" fill="#324a54">&#127970; On-prem datacenter</text>
  <text x="717" y="260" text-anchor="middle" font-size="12" fill="#324a54">your own GPU servers</text>
  <text x="717" y="280" text-anchor="middle" font-size="12" fill="#444">full data control · testing</text>
</svg>
