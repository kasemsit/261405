<svg viewBox="0 0 900 282" xmlns="http://www.w3.org/2000/svg"
     font-family="Inter, 'Segoe UI', 'Noto Sans Thai', system-ui, sans-serif">
  <defs>
    <marker id="ro-grey" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <polygon points="0 0, 9 3.5, 0 7" fill="#555"/>
    </marker>
    <marker id="ro-amber" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <polygon points="0 0, 9 3.5, 0 7" fill="#d97706"/>
    </marker>
  </defs>

  <!-- =================== SHADOW =================== -->
  <rect x="12" y="14" width="430" height="256" rx="12" fill="#eef3fd" stroke="#1d4ed8" stroke-width="2.5"/>
  <text x="227" y="40" text-anchor="middle" font-size="16" font-weight="700" fill="#10406b">Shadow</text>
  <text x="227" y="60" text-anchor="middle" font-size="11.5" fill="#444">new model runs in parallel, output <tspan font-weight="700">hidden</tspan></text>

  <!-- traffic -->
  <rect x="26" y="96" width="86" height="46" rx="8" fill="#eceff1" stroke="#5f7d8c" stroke-width="2"/>
  <text x="69" y="118" text-anchor="middle" font-size="11.5" fill="#324a54">Live</text>
  <text x="69" y="134" text-anchor="middle" font-size="11.5" fill="#324a54">traffic</text>

  <!-- current model -> users (solid) -->
  <line x1="112" y1="108" x2="156" y2="100" stroke="#555" stroke-width="2.2" marker-end="url(#ro-grey)"/>
  <rect x="158" y="80" width="120" height="40" rx="8" fill="#ffffff" stroke="#137333" stroke-width="2"/>
  <text x="218" y="105" text-anchor="middle" font-size="12" font-weight="700" fill="#0b5e26">Current model</text>
  <line x1="278" y1="100" x2="312" y2="100" stroke="#555" stroke-width="2.2" marker-end="url(#ro-grey)"/>
  <rect x="314" y="80" width="104" height="40" rx="8" fill="#e6f4ea" stroke="#137333" stroke-width="2"/>
  <text x="366" y="105" text-anchor="middle" font-size="12" fill="#0b5e26">&#128100; Users</text>

  <!-- copy to new model -> logs (dashed amber) -->
  <line x1="112" y1="130" x2="156" y2="180" stroke="#d97706" stroke-width="2" stroke-dasharray="5,4" marker-end="url(#ro-amber)"/>
  <text x="120" y="166" font-size="10.5" font-style="italic" fill="#8a5200">copy</text>
  <rect x="158" y="172" width="120" height="40" rx="8" fill="#fff3e0" stroke="#d97706" stroke-width="2"/>
  <text x="218" y="197" text-anchor="middle" font-size="12" font-weight="700" fill="#8a5200">New model</text>
  <line x1="278" y1="192" x2="312" y2="192" stroke="#d97706" stroke-width="2" stroke-dasharray="5,4" marker-end="url(#ro-amber)"/>
  <rect x="314" y="172" width="104" height="40" rx="8" fill="#fafbfc" stroke="#5f7d8c" stroke-width="2"/>
  <text x="366" y="197" text-anchor="middle" font-size="12" fill="#324a54">&#128203; logs only</text>

  <text x="227" y="242" text-anchor="middle" font-size="11.5" fill="#444">Compare silently &#8212; <tspan font-weight="700" fill="#137333">users never affected</tspan>.</text>
  <text x="227" y="260" text-anchor="middle" font-size="11.5" fill="#444">Safest, but no real user feedback.</text>

  <!-- =================== CANARY =================== -->
  <rect x="458" y="14" width="430" height="256" rx="12" fill="#eef7f0" stroke="#137333" stroke-width="2.5"/>
  <text x="673" y="40" text-anchor="middle" font-size="16" font-weight="700" fill="#0b5e26">Canary</text>
  <text x="673" y="60" text-anchor="middle" font-size="11.5" fill="#444">a <tspan font-weight="700">small %</tspan> of real users get the new model</text>

  <!-- traffic -->
  <rect x="472" y="96" width="86" height="46" rx="8" fill="#eceff1" stroke="#5f7d8c" stroke-width="2"/>
  <text x="515" y="118" text-anchor="middle" font-size="11.5" fill="#324a54">Live</text>
  <text x="515" y="134" text-anchor="middle" font-size="11.5" fill="#324a54">traffic</text>

  <!-- 95% current -->
  <line x1="558" y1="108" x2="602" y2="100" stroke="#137333" stroke-width="2.6" marker-end="url(#ro-grey)"/>
  <text x="566" y="92" font-size="11" font-weight="700" fill="#137333">95%</text>
  <rect x="604" y="80" width="120" height="40" rx="8" fill="#ffffff" stroke="#137333" stroke-width="2"/>
  <text x="664" y="105" text-anchor="middle" font-size="12" font-weight="700" fill="#0b5e26">Current model</text>

  <!-- 5% new -->
  <line x1="558" y1="130" x2="602" y2="180" stroke="#d97706" stroke-width="2" marker-end="url(#ro-amber)"/>
  <text x="560" y="160" font-size="11" font-weight="700" fill="#8a5200">5%</text>
  <rect x="604" y="172" width="120" height="40" rx="8" fill="#fff3e0" stroke="#d97706" stroke-width="2"/>
  <text x="664" y="197" text-anchor="middle" font-size="12" font-weight="700" fill="#8a5200">New model</text>

  <!-- both -> users -->
  <rect x="772" y="116" width="100" height="60" rx="8" fill="#e6f4ea" stroke="#137333" stroke-width="2"/>
  <text x="822" y="151" text-anchor="middle" font-size="12" fill="#0b5e26">&#128100; Users</text>
  <line x1="724" y1="100" x2="770" y2="134" stroke="#555" stroke-width="2" marker-end="url(#ro-grey)"/>
  <line x1="724" y1="192" x2="770" y2="158" stroke="#555" stroke-width="2" marker-end="url(#ro-grey)"/>

  <text x="673" y="242" text-anchor="middle" font-size="11.5" fill="#444">Watch live metrics, then <tspan font-weight="700" fill="#137333">ramp 5% &#8594; 100%</tspan>&#8230;</text>
  <text x="673" y="260" text-anchor="middle" font-size="11.5" fill="#444">&#8230;or <tspan font-weight="700" fill="#b8232f">roll back</tspan> instantly if it misbehaves.</text>
</svg>
