<svg viewBox="0 0 760 300" xmlns="http://www.w3.org/2000/svg"
     font-family="Inter, 'Segoe UI', 'Noto Sans Thai', system-ui, sans-serif">
  <defs>
    <marker id="gt-up" markerWidth="9" markerHeight="7" refX="4.5" refY="1" orient="auto">
      <polygon points="0 7, 4.5 0, 9 7" fill="#137333"/>
    </marker>
    <marker id="gt-dn" markerWidth="9" markerHeight="7" refX="4.5" refY="6" orient="auto">
      <polygon points="0 0, 4.5 7, 9 0" fill="#b8232f"/>
    </marker>
    <marker id="gt-arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#555"/>
    </marker>
  </defs>

  <!-- question -->
  <rect x="16" y="122" width="118" height="56" rx="8" fill="#7a1f2b"/>
  <text x="75" y="146" text-anchor="middle" fill="white" font-size="15" font-weight="700">12 &#215; 8 = ?</text>
  <text x="75" y="166" text-anchor="middle" fill="#f4c542" font-size="12">answer: 96</text>
  <line x1="134" y1="150" x2="170" y2="150" stroke="#555" stroke-width="2" marker-end="url(#gt-arr)"/>
  <text x="152" y="120" text-anchor="middle" font-size="11" fill="#888">sample 4</text>

  <!-- four rollouts -->
  <!-- row helper: boxes at x=170 width 250, rows y=44,96,148,200 (h=40) -->
  <!-- A1 correct -->
  <rect x="170" y="44" width="250" height="40" rx="7" fill="#e6f4ea" stroke="#137333"/>
  <text x="182" y="69" font-size="13" fill="#333">CoT&#8321; &#8594; <tspan font-weight="700">96</tspan>  &#10003;</text>
  <text x="392" y="69" text-anchor="end" font-size="13" font-weight="700" fill="#137333">r = 1</text>
  <!-- A2 wrong -->
  <rect x="170" y="96" width="250" height="40" rx="7" fill="#fdecec" stroke="#b8232f"/>
  <text x="182" y="121" font-size="13" fill="#333">CoT&#8322; &#8594; <tspan font-weight="700">84</tspan>  &#10007;</text>
  <text x="392" y="121" text-anchor="end" font-size="13" font-weight="700" fill="#b8232f">r = 0</text>
  <!-- A3 correct -->
  <rect x="170" y="148" width="250" height="40" rx="7" fill="#e6f4ea" stroke="#137333"/>
  <text x="182" y="173" font-size="13" fill="#333">CoT&#8323; &#8594; <tspan font-weight="700">96</tspan>  &#10003;</text>
  <text x="392" y="173" text-anchor="end" font-size="13" font-weight="700" fill="#137333">r = 1</text>
  <!-- A4 wrong -->
  <rect x="170" y="200" width="250" height="40" rx="7" fill="#fdecec" stroke="#b8232f"/>
  <text x="182" y="225" font-size="13" fill="#333">CoT&#8324; &#8594; <tspan font-weight="700">108</tspan> &#10007;</text>
  <text x="392" y="225" text-anchor="end" font-size="13" font-weight="700" fill="#b8232f">r = 0</text>

  <!-- group average line -->
  <line x1="440" y1="34" x2="440" y2="250" stroke="#d97706" stroke-width="2" stroke-dasharray="5,4"/>
  <text x="440" y="24" text-anchor="middle" font-size="12" font-weight="700" fill="#d97706">group average = 0.5</text>

  <!-- advantages -->
  <line x1="470" y1="78" x2="470" y2="50" stroke="#137333" stroke-width="2.5" marker-end="url(#gt-up)"/>
  <text x="482" y="66" font-size="12.5" font-weight="700" fill="#137333">A = +1  &#8594; more likely</text>

  <line x1="470" y1="106" x2="470" y2="134" stroke="#b8232f" stroke-width="2.5" marker-end="url(#gt-dn)"/>
  <text x="482" y="126" font-size="12.5" font-weight="700" fill="#b8232f">A = &#8722;1  &#8594; less likely</text>

  <line x1="470" y1="182" x2="470" y2="154" stroke="#137333" stroke-width="2.5" marker-end="url(#gt-up)"/>
  <text x="482" y="170" font-size="12.5" font-weight="700" fill="#137333">A = +1  &#8594; more likely</text>

  <line x1="470" y1="210" x2="470" y2="238" stroke="#b8232f" stroke-width="2.5" marker-end="url(#gt-dn)"/>
  <text x="482" y="230" font-size="12.5" font-weight="700" fill="#b8232f">A = &#8722;1  &#8594; less likely</text>

  <text x="596" y="285" text-anchor="middle" font-size="12" font-style="italic" fill="#7a1f2b">&#8220;beat your own average&#8221;</text>
</svg>
