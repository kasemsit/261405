<svg viewBox="0 0 386 224" xmlns="http://www.w3.org/2000/svg"
     font-family="Inter, 'Segoe UI', 'Noto Sans Thai', system-ui, sans-serif">

  <!-- ═══ ROW 1 TITLES ════════════════════════════════════════ -->
  <text x="64"  y="13" text-anchor="middle" font-size="10.5" font-weight="700" fill="#444">Classification</text>
  <text x="193" y="13" text-anchor="middle" font-size="10.5" font-weight="700" fill="#444">Detection</text>
  <text x="322" y="13" text-anchor="middle" font-size="10.5" font-weight="700" fill="#444">Segmentation</text>

  <!-- ── Panel 1: Classification ── -->
  <rect x="5"   y="18" width="118" height="88" rx="4" fill="#1c2333" stroke="#555" stroke-width="1"/>
  <ellipse cx="64" cy="58" rx="32" ry="22" fill="#d0d0d0"/>
  <rect x="9"   y="93" width="110" height="10" rx="3" fill="#137333"/>
  <text x="64"  y="102" text-anchor="middle" font-size="9" font-weight="700" fill="white">cat · 91%</text>

  <!-- ── Panel 2: Detection ── -->
  <rect x="134" y="18" width="118" height="88" rx="4" fill="#1c2333" stroke="#555" stroke-width="1"/>
  <ellipse cx="193" cy="58" rx="32" ry="22" fill="#d0d0d0"/>
  <rect x="155" y="30" width="76" height="54" rx="3" fill="none" stroke="#d97706" stroke-width="1.8"/>
  <rect x="155" y="26" width="30" height="13" rx="3" fill="#d97706"/>
  <text x="170"  y="36" text-anchor="middle" font-size="8.5" font-weight="700" fill="white">cat</text>
  <text x="232"  y="37" text-anchor="end" font-size="8" fill="#d97706">93%</text>

  <!-- ── Panel 3: Segmentation ── -->
  <rect x="263" y="18" width="118" height="88" rx="4" fill="#1e3a5f" stroke="#555" stroke-width="1"/>
  <ellipse cx="322" cy="58" rx="32" ry="22" fill="#137333"/>
  <rect x="270" y="92" width="9" height="9" rx="1" fill="#137333"/>
  <text x="282"  y="100" font-size="8" fill="#8ab4d4">object</text>
  <rect x="316" y="92" width="9" height="9" rx="1" fill="#1e3a5f" stroke="#6688aa" stroke-width="1"/>
  <text x="328"  y="100" font-size="8" fill="#8ab4d4">bg</text>

  <!-- ═══ ROW 2 TITLES ════════════════════════════════════════ -->
  <text x="64"  y="122" text-anchor="middle" font-size="10.5" font-weight="700" fill="#444">Keypoint</text>
  <text x="193" y="122" text-anchor="middle" font-size="10.5" font-weight="700" fill="#444">OCR</text>
  <text x="322" y="122" text-anchor="middle" font-size="10.5" font-weight="700" fill="#444">Visual Q&amp;A</text>

  <!-- ── Panel 4: Keypoint detection ── -->
  <rect x="5"   y="128" width="118" height="88" rx="4" fill="#1c2333" stroke="#555" stroke-width="1"/>
  <!-- skeleton lines (drawn first, behind dots) -->
  <line x1="64" y1="144" x2="64" y2="153" stroke="#777" stroke-width="1.2"/>
  <line x1="64" y1="153" x2="50" y2="153" stroke="#777" stroke-width="1.2"/>
  <line x1="64" y1="153" x2="78" y2="153" stroke="#777" stroke-width="1.2"/>
  <line x1="50" y1="153" x2="42" y2="168" stroke="#777" stroke-width="1.2"/>
  <line x1="78" y1="153" x2="86" y2="168" stroke="#777" stroke-width="1.2"/>
  <line x1="64" y1="153" x2="64" y2="170" stroke="#777" stroke-width="1.2"/>
  <line x1="64" y1="170" x2="55" y2="170" stroke="#777" stroke-width="1.2"/>
  <line x1="64" y1="170" x2="73" y2="170" stroke="#777" stroke-width="1.2"/>
  <line x1="55" y1="170" x2="50" y2="186" stroke="#777" stroke-width="1.2"/>
  <line x1="50" y1="186" x2="46" y2="202" stroke="#777" stroke-width="1.2"/>
  <line x1="73" y1="170" x2="78" y2="186" stroke="#777" stroke-width="1.2"/>
  <line x1="78" y1="186" x2="82" y2="202" stroke="#777" stroke-width="1.2"/>
  <!-- keypoint dots -->
  <circle cx="64" cy="137" r="3.5" fill="#f59e0b"/>
  <circle cx="50" cy="153" r="3" fill="#f59e0b"/>
  <circle cx="78" cy="153" r="3" fill="#f59e0b"/>
  <circle cx="42" cy="168" r="3" fill="#f59e0b"/>
  <circle cx="86" cy="168" r="3" fill="#f59e0b"/>
  <circle cx="64" cy="170" r="3" fill="#f59e0b"/>
  <circle cx="55" cy="170" r="2.5" fill="#f59e0b"/>
  <circle cx="73" cy="170" r="2.5" fill="#f59e0b"/>
  <circle cx="50" cy="186" r="2.5" fill="#f59e0b"/>
  <circle cx="78" cy="186" r="2.5" fill="#f59e0b"/>
  <circle cx="46" cy="202" r="2.5" fill="#f59e0b"/>
  <circle cx="82" cy="202" r="2.5" fill="#f59e0b"/>

  <!-- ── Panel 5: OCR ── -->
  <rect x="134" y="128" width="118" height="88" rx="4" fill="#1c2333" stroke="#555" stroke-width="1"/>
  <!-- document/paper -->
  <rect x="141" y="134" width="104" height="76" rx="2" fill="#f5f5f0"/>
  <!-- text lines on paper -->
  <rect x="148" y="143" width="68" height="5" rx="1" fill="#aaa"/>
  <rect x="148" y="152" width="80" height="5" rx="1" fill="#999"/>
  <rect x="148" y="161" width="58" height="5" rx="1" fill="#aaa"/>
  <rect x="148" y="170" width="72" height="5" rx="1" fill="#999"/>
  <rect x="148" y="179" width="42" height="5" rx="1" fill="#aaa"/>
  <!-- OCR highlight box around one line -->
  <rect x="145" y="149" width="88" height="11" rx="2" fill="none" stroke="#d97706" stroke-width="1.5"/>
  <!-- recognized result bar -->
  <rect x="141" y="198" width="104" height="12" rx="2" fill="#d97706"/>
  <text x="193" y="208" text-anchor="middle" font-size="8" font-weight="700" fill="white">recognized ✓</text>

  <!-- ── Panel 6: Visual Q&amp;A ── -->
  <rect x="263" y="128" width="118" height="88" rx="4" fill="#1c2333" stroke="#555" stroke-width="1"/>
  <!-- image area: triangle + other shapes -->
  <polygon points="295,180 278,180 287,158" fill="#f59e0b"/>
  <circle cx="325" cy="170" r="10" fill="#b8232f"/>
  <rect x="312" y="148" width="18" height="18" rx="2" fill="#1d4ed8"/>
  <!-- divider -->
  <line x1="263" y1="185" x2="381" y2="185" stroke="#444" stroke-width="0.8"/>
  <!-- Q&A text -->
  <text x="268" y="197" font-size="8.5" fill="#94a3b8">Q: How many shapes?</text>
  <text x="268" y="210" font-size="9" font-weight="700" fill="#4ade80">A: 3</text>
</svg>
