<svg viewBox="0 0 440 152" xmlns="http://www.w3.org/2000/svg"
     font-family="Inter, 'Segoe UI', 'Noto Sans Thai', system-ui, sans-serif">
  <defs>
    <filter id="adv-noise" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.75" numOctaves="2" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
    </filter>
  </defs>

  <!-- panel 1: clean -->
  <rect x="16" y="14" width="100" height="100" rx="8" fill="#eef0f2" stroke="#aaa" stroke-width="1.5"/>
  <text x="66" y="78" text-anchor="middle" font-size="46">&#128060;</text>
  <text x="66" y="134" text-anchor="middle" font-size="12.5" font-weight="600" fill="#137333">&#8220;panda&#8221; 57%</text>

  <text x="130" y="72" text-anchor="middle" font-size="26" fill="#555">+</text>

  <!-- panel 2: noise -->
  <rect x="146" y="14" width="100" height="100" rx="8" filter="url(#adv-noise)" opacity="0.85"/>
  <rect x="146" y="14" width="100" height="100" rx="8" fill="none" stroke="#aaa" stroke-width="1.5"/>
  <text x="196" y="134" text-anchor="middle" font-size="12.5" font-weight="600" fill="#444">tiny noise &#215;&#949;</text>

  <text x="260" y="72" text-anchor="middle" font-size="26" fill="#555">=</text>

  <!-- panel 3: adversarial -->
  <rect x="276" y="14" width="100" height="100" rx="8" fill="#eef0f2" stroke="#b8232f" stroke-width="2.5"/>
  <text x="326" y="78" text-anchor="middle" font-size="46">&#128060;</text>
  <text x="326" y="134" text-anchor="middle" font-size="12.5" font-weight="700" fill="#b8232f">&#8220;gibbon&#8221; 99%</text>

  <!-- looks-identical brace -->
  <text x="408" y="64" text-anchor="middle" font-size="11" fill="#777" transform="rotate(90 408 64)">looks identical to us</text>
</svg>
