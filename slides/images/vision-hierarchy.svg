<svg viewBox="0 0 720 132" xmlns="http://www.w3.org/2000/svg"
     font-family="Inter, 'Segoe UI', 'Noto Sans Thai', system-ui, sans-serif">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#555"/>
    </marker>
  </defs>

  <text x="360" y="12" text-anchor="middle" font-size="10.5" fill="#888" font-style="italic">Each layer extracts more abstract patterns from the layer before it</text>

  <!-- ── Stage 1: Raw pixels ── -->
  <rect x="50" y="18" width="100" height="72" rx="6" fill="#111" stroke="#444" stroke-width="1.5"/>
  <!-- 5×4 pixel grid, cell=12, centered at x=70, y=22 -->
  <rect x="70" y="22" width="12" height="12" fill="#000"/><rect x="82" y="22" width="12" height="12" fill="#808080"/>
  <rect x="94" y="22" width="12" height="12" fill="#e6e6e6"/><rect x="106" y="22" width="12" height="12" fill="#333"/>
  <rect x="118" y="22" width="12" height="12" fill="#000"/>
  <rect x="70" y="34" width="12" height="12" fill="#4d4d4d"/><rect x="82" y="34" width="12" height="12" fill="#ccc"/>
  <rect x="94" y="34" width="12" height="12" fill="#fff"/><rect x="106" y="34" width="12" height="12" fill="#000"/>
  <rect x="118" y="34" width="12" height="12" fill="#000"/>
  <rect x="70" y="46" width="12" height="12" fill="#000"/><rect x="82" y="46" width="12" height="12" fill="#0d0d0d"/>
  <rect x="94" y="46" width="12" height="12" fill="#fff"/><rect x="106" y="46" width="12" height="12" fill="#000"/>
  <rect x="118" y="46" width="12" height="12" fill="#000"/>
  <rect x="70" y="58" width="12" height="12" fill="#000"/><rect x="82" y="58" width="12" height="12" fill="#000"/>
  <rect x="94" y="58" width="12" height="12" fill="#e6e6e6"/><rect x="106" y="58" width="12" height="12" fill="#000"/>
  <rect x="118" y="58" width="12" height="12" fill="#000"/>
  <text x="100" y="104" text-anchor="middle" font-size="10" fill="#888">layer 0</text>
  <text x="100" y="117" text-anchor="middle" font-size="11" font-weight="600" fill="#444">Raw pixels</text>

  <!-- arrow 1 -->
  <line x1="153" y1="54" x2="177" y2="54" stroke="#555" stroke-width="2" marker-end="url(#arr)"/>

  <!-- ── Stage 2: Edges ── -->
  <rect x="180" y="18" width="100" height="72" rx="6" fill="#111" stroke="#444" stroke-width="1.5"/>
  <line x1="188" y1="70" x2="216" y2="30" stroke="#bbb" stroke-width="1.5"/>
  <line x1="242" y1="24" x2="242" y2="80" stroke="#bbb" stroke-width="1.5"/>
  <line x1="205" y1="73" x2="270" y2="73" stroke="#bbb" stroke-width="1.5"/>
  <text x="230" y="104" text-anchor="middle" font-size="10" fill="#888">layers 1–2</text>
  <text x="230" y="117" text-anchor="middle" font-size="11" font-weight="600" fill="#444">Edges</text>

  <!-- arrow 2 -->
  <line x1="283" y1="54" x2="307" y2="54" stroke="#555" stroke-width="2" marker-end="url(#arr)"/>

  <!-- ── Stage 3: Shapes ── -->
  <rect x="310" y="18" width="100" height="72" rx="6" fill="#111" stroke="#444" stroke-width="1.5"/>
  <path d="M 320,76 Q 360,20 400,76" fill="none" stroke="#bbb" stroke-width="1.5"/>
  <line x1="322" y1="76" x2="398" y2="76" stroke="#bbb" stroke-width="1.5"/>
  <text x="360" y="104" text-anchor="middle" font-size="10" fill="#888">layers 3–5</text>
  <text x="360" y="117" text-anchor="middle" font-size="11" font-weight="600" fill="#444">Shapes</text>

  <!-- arrow 3 -->
  <line x1="413" y1="54" x2="437" y2="54" stroke="#555" stroke-width="2" marker-end="url(#arr)"/>

  <!-- ── Stage 4: Object parts (cat face outline) ── -->
  <rect x="440" y="18" width="100" height="72" rx="6" fill="#111" stroke="#444" stroke-width="1.5"/>
  <circle cx="490" cy="62" r="22" fill="none" stroke="#bbb" stroke-width="1.5"/>
  <polygon points="471,46 478,27 487,46" fill="none" stroke="#bbb" stroke-width="1.5"/>
  <polygon points="493,46 502,27 509,46" fill="none" stroke="#bbb" stroke-width="1.5"/>
  <circle cx="483" cy="58" r="3" fill="#bbb"/>
  <circle cx="497" cy="58" r="3" fill="#bbb"/>
  <text x="490" y="104" text-anchor="middle" font-size="10" fill="#888">layers 6–8</text>
  <text x="490" y="117" text-anchor="middle" font-size="11" font-weight="600" fill="#444">Object parts</text>

  <!-- arrow 4 -->
  <line x1="543" y1="54" x2="567" y2="54" stroke="#555" stroke-width="2" marker-end="url(#arr)"/>

  <!-- ── Stage 5: Prediction ── -->
  <rect x="570" y="18" width="100" height="72" rx="6" fill="#137333" stroke="#0a5225" stroke-width="1.5"/>
  <text x="620" y="57" text-anchor="middle" font-size="24" font-weight="800" fill="white">cat</text>
  <text x="620" y="76" text-anchor="middle" font-size="13" fill="#a3f0b8">&#10003; 94%</text>
  <text x="620" y="104" text-anchor="middle" font-size="10" fill="#888">output layer</text>
  <text x="620" y="117" text-anchor="middle" font-size="11" font-weight="600" fill="#444">Prediction</text>
</svg>
